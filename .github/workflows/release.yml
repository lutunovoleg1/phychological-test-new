name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: eNCT-A-linux
            asset_name: eNCT-A-linux
          - os: windows-latest
            artifact_name: eNCT-A-windows.exe
            asset_name: eNCT-A-windows.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash

      - name: Run tests
        run: |
          python -m pytest tests/ -v
        shell: bash

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "${{ matrix.artifact_name }}" main.py
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}${{ endsWith(matrix.os, 'windows') && '.exe' || '' }}

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: eNCT-A-windows.exe
          path: ./release

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: eNCT-A-linux
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release/eNCT-A-windows.exe
            ./release/eNCT-A-linux
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
