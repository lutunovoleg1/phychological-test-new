name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: eNCT-A-linux
            asset_pattern: eNCT-A-linux
            use_docker: false
          - os: windows-latest
            artifact_name: eNCT-A-windows.exe
            asset_pattern: eNCT-A-windows.exe
            use_docker: false
          - os: ubuntu-latest
            artifact_name: eNCT-A-catchyos
            asset_pattern: eNCT-A-catchyos
            use_docker: true
            docker_image: archlinux:latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ !matrix.use_docker }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: ${{ !matrix.use_docker }}
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        if: ${{ !matrix.use_docker }}
        run: |
          python -m pytest tests/ -v

      - name: Build with PyInstaller (Native)
        if: ${{ !matrix.use_docker }}
        run: |
          pyinstaller --onefile --windowed --name "${{ matrix.artifact_name }}" main.py

      - name: Build with PyInstaller (Docker for Arch/CatchyOS)
        if: ${{ matrix.use_docker }}
        run: |
          docker build -f Dockerfile.arch -t eNCT-A-builder:latest --build-arg ARTIFACT_NAME=${{ matrix.artifact_name }} .
          container_id=$(docker create eNCT-A-builder:latest)
          docker cp $container_id:/src/dist/${{ matrix.artifact_name }} dist/${{ matrix.artifact_name }}
          docker rm $container_id

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}${{ endsWith(matrix.os, 'windows') && '.exe' || '' }}

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: eNCT-A-windows.exe
          path: ./release

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: eNCT-A-linux
          path: ./release

      - name: Download CatchyOS artifact
        uses: actions/download-artifact@v4
        with:
          name: eNCT-A-catchyos
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release/eNCT-A-windows.exe
            ./release/eNCT-A-linux
            ./release/eNCT-A-catchyos
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
